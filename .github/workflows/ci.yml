name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Lint (flake8)
        run: |
          flake8 scripts model auth server preprocessing dataset --count --select=E9,F63,F7,F82 --show-source --statistics || true
      - name: Unit tests
        run: |
          pytest -q tests
      - name: Eval smoke
        run: |
          python scripts/data/build_dataset_manifest.py --dataset-dir dataset/samples || true
